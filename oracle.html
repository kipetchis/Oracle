<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oracle - Connexion</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

  <script>
    // Ta configuration Firebase
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyCLag6Sggmy7brtOD5LDv_gQid3pMW90wg", // REMPLACE PAR TA CLÉ
      authDomain: "oracle-360d6.firebaseapp.com",
      projectId: "oracle-360d6",
      storageBucket: "oracle-360d6.firebasestorage.app",
      messagingSenderId: "160038588661",
      appId: "1:160038588661:web:fe50c75d30cc214fe9f5bc", // REMPLACE PAR TON APP ID
      measurementId: "G-1E44D6J5X5"
    };

    // Initialisation globale
    let fbApp, fbAuth, fbDb;

    function loadFirebase() {
      try {
        if (!firebase.apps.length) {
          fbApp = firebase.initializeApp(FIREBASE_CONFIG);
        } else {
          fbApp = firebase.app();
        }
        fbAuth = firebase.auth();
        fbDb = firebase.firestore();
        console.log("Firebase initialisé avec succès");
      } catch (error) {
        console.error("Erreur d'initialisation Firebase:", error);
      }
    }

    // Lancer l'initialisation au chargement
    window.onload = () => {
      loadFirebase();
      handleAuth(); // Vérifie si l'utilisateur revient d'une redirection Google
    };

    async function handleAuth() {
      fbAuth.onAuthStateChanged(async (user) => {
        if (user) {
          console.log("Utilisateur connecté:", user.email);
          // Redirection ou mise à jour de l'interface ici
          window.location.href = "#game"; // Exemple de redirection
        }
      });

      // Gestion spécifique au retour de Google Redirect
      try {
        const result = await fbAuth.getRedirectResult();
        if (result.user) {
          syncUserData(result.user);
        }
      } catch (error) {
        console.error("Erreur lors de la redirection Google:", error);
      }
    }

    async function signInWithGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await fbAuth.signInWithRedirect(provider);
      } catch (error) {
        console.error("Erreur Google Sign-In:", error.message);
        alert("Erreur de connexion Google : " + error.message);
      }
    }

    async function syncUserData(user) {
      if (!user) return;
      const userRef = fbDb.collection('users').doc(user.uid);
      await userRef.set({
        email: user.email,
        lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
        displayName: user.displayName
      }, { merge: true });
    }

    // Le reste de tes fonctions (toggleAuthMode, skipAuth, etc.) doit être conservé ici...
  </script>

  <style>
    /* Conserve ici tout ton CSS d'origine */
    body { font-family: sans-serif; background: #0a0a0a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .auth-container { background: #1a1a1a; padding: 2rem; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; }
    .google-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; margin-top: 15px; border: none; border-radius: 6px; cursor: pointer; background: white; color: #444; font-weight: bold; }
  </style>
</head>
<body>

  <div class="auth-container" id="authContainer">
    <h2 id="authTitle">Créer un compte</h2>
    
    <button class="google-btn" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      <span>Continuer avec Google</span>
    </button>
  </div>

</body>
</html>
