<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="manifest" href="/Oracle/manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#08080f">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#050a12"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Oracle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#050a12;
      --glow-science:#00c2ff;--glow-positive:#39ff8f;--glow-fun:#ff9f3f;
      --glow-history:#e0a060;--glow-space:#c084fc;--glow-animals:#f472b6;
      --glow-body:#fb7185;--glow-arts:#f59e0b;--glow-inventions:#34d399;
      --glow-world:#22d3ee;--glow-language:#a78bfa;--glow-food:#f87171;
      --glow-sports:#86efac;
      --text:#e8e0d0;--text-muted:#7a7060;--orb-size:min(44vw,200px);
      --ad-h:56px;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Cormorant Garamond',Georgia,serif;overflow:hidden;user-select:none;-webkit-tap-highlight-color:transparent;}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background-image:
        radial-gradient(1px 1px at 12% 18%,rgba(255,255,255,.55) 0%,transparent 100%),
        radial-gradient(1px 1px at 78% 9%,rgba(255,255,255,.4) 0%,transparent 100%),
        radial-gradient(1.5px 1.5px at 34% 72%,rgba(255,255,255,.5) 0%,transparent 100%),
        radial-gradient(1px 1px at 91% 55%,rgba(255,255,255,.35) 0%,transparent 100%),
        radial-gradient(1px 1px at 5% 88%,rgba(255,255,255,.45) 0%,transparent 100%),
        radial-gradient(1px 1px at 60% 33%,rgba(255,255,255,.3) 0%,transparent 100%),
        radial-gradient(1px 1px at 47% 95%,rgba(255,255,255,.5) 0%,transparent 100%),
        radial-gradient(1.5px 1.5px at 22% 44%,rgba(255,255,255,.4) 0%,transparent 100%),
        radial-gradient(1px 1px at 85% 78%,rgba(255,255,255,.35) 0%,transparent 100%),
        radial-gradient(1px 1px at 55% 15%,rgba(255,255,255,.5) 0%,transparent 100%);}

    .app{position:relative;z-index:1;height:100dvh;display:flex;flex-direction:column;}

    /* AD BANNER */
    .ad-banner{flex-shrink:0;height:var(--ad-h);background:rgba(255,255,255,.03);border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;gap:10px;order:10;}
    .ad-banner-label{font-family:'Space Mono',monospace;font-size:.48rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted);opacity:.5;}
    .ad-banner-content{font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.1em;color:var(--text-muted);opacity:.6;}
    .ad-remove-btn{font-family:'Space Mono',monospace;font-size:.44rem;letter-spacing:.12em;text-transform:uppercase;background:none;border:1px solid rgba(255,255,255,.12);color:var(--text-muted);padding:4px 10px;border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap;}
    .ad-remove-btn:hover{background:rgba(255,220,80,.1);border-color:rgba(255,220,80,.3);color:#ffd700;}

    /* TOP BAR */
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 0;flex-shrink:0;}
    .topbar-left{display:flex;align-items:center;gap:8px;}
    .topbar-title{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;color:var(--text-muted);}
    .planet-indicator{display:flex;align-items:center;gap:5px;cursor:pointer;padding:4px 8px;border-radius:20px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);transition:background .2s;}
    .planet-indicator:hover{background:rgba(255,255,255,.09);}
    .planet-indicator-emoji{font-size:13px;line-height:1;}
    .planet-indicator-name{font-family:'Space Mono',monospace;font-size:.48rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);}
    .topbar-actions{display:flex;gap:7px;}
    .icon-btn{position:relative;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s;font-size:14px;}
    .icon-btn:hover{background:rgba(255,255,255,.1);}

    /* SCENE */
    .scene{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 24px 16px;overflow:hidden;}
    .header{text-align:center;margin-bottom:20px;opacity:.85;}
    .header h1{font-size:clamp(1.4rem,4.5vw,1.9rem);font-weight:400;letter-spacing:.35em;text-transform:uppercase;font-family:'Playfair Display',serif;}
    .header p{font-style:italic;font-size:clamp(.75rem,2.2vw,.9rem);color:var(--text-muted);margin-top:3px;letter-spacing:.1em;font-family:'Playfair Display',serif;font-weight:400;}

    /* ORB */
    .orb-wrapper{position:relative;width:var(--orb-size);height:var(--orb-size);margin-bottom:24px;cursor:pointer;flex-shrink:0;}
    .orb-ring{position:absolute;inset:-16px;border-radius:50%;border:1px solid rgba(255,255,255,.07);animation:ringRotate 18s linear infinite;}
    @keyframes ringRotate{to{transform:rotate(360deg);}}
    .orb{position:absolute;inset:0;border-radius:50%;transition:box-shadow .4s ease,transform .15s ease;animation:orbPulse 4s ease-in-out infinite;}
    .orb-shadow{position:absolute;inset:0;border-radius:50%;pointer-events:none;z-index:3;
      background:radial-gradient(ellipse at 20% 50%,rgba(0,0,0,0) 30%,rgba(0,0,0,0) 52%,rgba(0,0,0,.55) 68%,rgba(0,0,0,.82) 80%,rgba(0,0,0,.92) 100%);}
    
    @keyframes orbPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.02);}}

    .fact-container{text-align:center;max-width:500px;min-height:140px;display:flex;flex-direction:column;justify-content:center;position:relative;}
    .fact-text{font-size:clamp(1.1rem,3.8vw,1.4rem);line-height:1.5;letter-spacing:.02em;margin-bottom:12px;transition:opacity .3s, transform .3s;}
    .fact-category{font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.25em;text-transform:uppercase;color:var(--text-muted);opacity:.7;}

    /* NAV */
    .nav{display:flex;gap:40px;margin-top:30px;align-items:center;flex-shrink:0;}
    .nav-btn{background:none;border:none;color:var(--text-muted);font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;padding:10px;opacity:.6;transition:all .3s;}
    .nav-btn:hover{opacity:1;color:var(--text);}
    .nav-btn:disabled{opacity:.1;cursor:default;}
  </style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">Oracle</div>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
    </div>
  </div>

  <div class="scene">
    <div class="header">
      <h1>L'Oracle</h1>
      <p id="subTitle">Appuyez sur l'orbe pour découvrir</p>
    </div>

    <div class="orb-wrapper" onclick="nextFact()">
      <div class="orb-ring"></div>
      <div class="orb" id="orb"></div>
      <div class="orb-shadow"></div>
    </div>

    <div class="fact-container">
      <div class="fact-text" id="factText">Le savoir vous attend...</div>
      <div class="fact-category" id="factCat">Éveil</div>
    </div>

    <div class="nav">
      <button class="nav-btn" id="prevBtn" onclick="prevFact()" disabled>Précédent</button>
      <button class="nav-btn" onclick="nextFact()">Suivant</button>
    </div>
  </div>
</div>

<script>
  // --- CONFIG ET ETAT ---
  let isMuted = false;
  let bgMusic = null;
  let audioPlayer = null;
  
  // Simulation de données (remplace avec les tiennes)
  const FACTS = [
    {text: "Le cœur d'une crevette se trouve dans sa tête.", cat: "ANIMAUX", color: "#f472b6"},
    {text: "Les flamants roses sont nés gris.", cat: "ANIMAUX", color: "#f472b6"},
    {text: "L'espace est complètement silencieux.", cat: "ESPACE", color: "#c084fc"}
  ];
  let currentIndex = -1;

  // Initialisation de la musique d'ambiance
  function initAudio() {
    if (!bgMusic) {
      bgMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'); // Remplace par ton URL
      bgMusic.loop = true;
      bgMusic.volume = 0.3;
    }
  }

  // --- CORRECTIONS ---

  function toggleMute() {
    isMuted = !isMuted;
    const muteBtn = document.getElementById('muteBtn');
    if (muteBtn) muteBtn.innerHTML = isMuted ? '🔇' : '🔊';

    if (isMuted) {
      // On coupe le son du fait en cours s'il existe
      if (audioPlayer) audioPlayer.pause();
      // On coupe aussi la musique d'ambiance
      if (bgMusic) bgMusic.pause();
    } else {
      // Si on réactive le son, on relance la musique d'ambiance
      if (bgMusic) {
        bgMusic.play().catch(e => console.log("Erreur BGM:", e));
      }
    }
  }

  function playBGM() {
    // On vérifie si la musique existe ET si le mode silencieux n'est pas actif
    if (bgMusic && !isMuted) {
      bgMusic.play().catch(e => console.log("Erreur BGM au lancement:", e));
    }
  }

  // --- LOGIQUE APP ---

  function nextFact() {
    initAudio(); // Initialise au premier clic
    playBGM();
    
    currentIndex++;
    if (currentIndex >= FACTS.length) currentIndex = 0;
    updateUI();
  }

  function prevFact() {
    if (currentIndex > 0) {
      currentIndex--;
      updateUI();
    }
  }

  function updateUI() {
    const fact = FACTS[currentIndex];
    const textEl = document.getElementById('factText');
    const catEl = document.getElementById('factCat');
    const orbEl = document.getElementById('orb');
    
    textEl.textContent = fact.text;
    catEl.textContent = fact.cat;
    orbEl.style.boxShadow = `0 0 40px ${fact.color}, inset 0 0 20px ${fact.color}`;
    
    document.getElementById('prevBtn').disabled = (currentIndex <= 0);
  }

  // Interaction utilisateur requise pour l'audio sur certains navigateurs
  document.body.addEventListener('click', () => {
    initAudio();
    playBGM();
  }, { once: true });

</script>

</body>
</html>
